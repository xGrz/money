name: Package tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2, 8.3, 8.4]
        laravel: [10.*, 11.*, 12.*, 13.*]
        dependency-stability: [prefer-stable]

        exclude:
          - laravel: 11.*
            php: 8.1
          - laravel: 12.*
            php: 8.1
          - laravel: 13.*
            php: 8.1
          - laravel: 13.*
            php: 8.2

    name: Laravel ${{ matrix.laravel }} | PHP ${{ matrix.php }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, bcmath, sqlite3
          coverage: none

      - name: Require Laravel
        run: composer require "laravel/framework:${{ matrix.laravel }}" --no-update

      # 🔥 KLUCZOWE: dopasowanie Testbench do wersji Laravel

      - name: Require Testbench (Laravel 10)
        if: ${{ matrix.laravel == '10.*' }}
        run: composer require --dev "orchestra/testbench:^8.0" --no-update

      - name: Require Testbench (Laravel 11)
        if: ${{ matrix.laravel == '11.*' }}
        run: composer require --dev "orchestra/testbench:^9.0" --no-update

      - name: Require Testbench (Laravel 12)
        if: ${{ matrix.laravel == '12.*' }}
        run: composer require --dev "orchestra/testbench:^10.0" --no-update

      - name: Require Testbench (Laravel 13)
        if: ${{ matrix.laravel == '13.*' }}
        run: composer require --dev "orchestra/testbench:^11.0" --no-update

      - name: Install dependencies
        run: composer update --${{ matrix.dependency-stability }} --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse